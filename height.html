<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Height Comparison — SKYSCRAPERS</title>
  <link rel="stylesheet" href="https://use.typekit.net/ftc8rtb.css"/>
  <link rel="stylesheet" href="style.css"/>
  <style>
    body { overflow: hidden; }

    .height-page {
      padding-top: 56px;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .height-header {
      padding: 1.2rem 3rem 0.8rem;
      color: #fff;
      font-family: 'futura-pt', sans-serif;
      font-size: 0.95rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 700;
    }

    /* Active nav distinction (height page only) */
    .nav-links a.active {
      box-shadow: inset 0 -3px 0 #0078BF;
    }

    /* ── Chart area: hide native scrollbar; we use custom one below ── */
    .height-chart-area {
      flex: 1;
      display: flex;
      align-items: flex-end;       /* shared ground line */
      overflow-x: auto;
      overflow-y: hidden;
      padding: 2rem 3rem 0 3rem;
      gap: 22px;
      background: linear-gradient(180deg, #01060b 0%, #000000 100%);
      scrollbar-width: none;
    }
    .height-chart-area::-webkit-scrollbar { display: none; }

    .h-item {
      display: flex;
      flex-direction: column;
      align-items: center;       /* visual centering of label under building */
      justify-content: flex-start; /* changed to flex-start to allow manual baseline control */
      flex-shrink: 0;
      text-decoration: none;
      color: inherit;
      height: 100%;
      padding-bottom: 0.6rem;
    }

    .h-svg-wrap {
      display: flex;
      align-items: flex-end;     /* SVG bottom = baseline */
      justify-content: center;
      width: 100%;
      flex: 1;                   /* take up all available space to push label down */
      line-height: 0;
      padding-bottom: 18px;
    }

    .h-item svg {
      display: block;
      overflow: hidden;
      filter: drop-shadow(0 0 14px rgba(0, 120, 191, 0.18));
    }

    .h-label {
      font-family: 'futura-pt', sans-serif;
      font-size: 0.82rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #ffffff;
      text-align: center;
      margin-top: 0.7rem;
      line-height: 1.2;
      font-weight: 800;
      max-width: 130px;
      min-height: 2.4em;
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }

    .h-meters {
      font-family: 'futura-pt', sans-serif;
      font-size: 0.86rem;
      color: #4eb5ff;
      text-align: center;
      margin-top: 0.3rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-weight: 800;
      min-height: 1.2em;
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }

    /* ── Footer ───────────────────────────────────────────── */
    .height-footer-bar {
      padding: 0.7rem 3rem 0.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: 'futura-pt', sans-serif;
      font-size: 0.9rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #ffffff;
      background: #000;
      font-weight: 700;
      border-top: 1px solid #1a1a1a;
    }

    .footer-count {
      color: #4eb5ff;
      font-weight: 800;
    }

    /* ── Custom scrollbar (functional) ────────────────────── */
    .scroll-track {
      position: relative;
      height: 18px;             /* tall hit area */
      background: #050505;
      border-top: 1px solid #1a1a1a;
      cursor: pointer;
      user-select: none;
    }
    .scroll-track::before {
      content: '';
      position: absolute;
      left: 0; right: 0; top: 50%;
      height: 2px;
      transform: translateY(-50%);
      background: #1a1a1a;
      pointer-events: none;
    }
    .scroll-thumb {
      position: absolute;
      top: 3px;
      bottom: 3px;
      left: 0;
      min-width: 60px;
      background: #0078BF;
      border-radius: 2px;
      cursor: grab;
      transition: background 0.15s;
      box-shadow: 0 0 12px rgba(0, 120, 191, 0.55);
    }
    .scroll-thumb:hover { background: #2a93d6; }
    .scroll-thumb.dragging { background: #2a93d6; cursor: grabbing; }

    @media (max-width: 640px) {
      .height-chart-area {
        padding: 1.5rem 1.1rem 0 1.1rem;
        gap: 14px;
      }
      .height-header { padding: 1rem 1.1rem 0.5rem; font-size: 0.82rem; }
      .height-footer-bar {
        padding: 0.6rem 1.1rem;
        gap: 0.8rem;
        flex-direction: column;
        font-size: 0.72rem;
      }
    }
  </style>
</head>
<body>

  <nav class="nav" role="navigation">
    <a href="index.html" class="nav-logo">SKYSCRAPERS</a>
    <ul class="nav-links">
      <li><a href="archive.html">Archive</a></li>
      <li><a href="timeline.html">Timeline</a></li>
      <li><a href="height.html" class="active">Height comparison</a></li>
      <li><a href="about.html">About</a></li>
    </ul>
    <button class="nav-toggle" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <div class="height-page">
    <div class="height-header">All buildings sorted by height — every skyscraper drawn to scale on a shared ground line (spire-inclusive).</div>
    <div class="height-chart-area" id="chart"></div>
    <div class="scroll-track" id="scroll-track">
      <div class="scroll-thumb" id="scroll-thumb"></div>
    </div>
    <div class="height-footer-bar">
      <span>Tallest → Shortest</span>
      <span class="footer-count" id="building-count"></span>
      <span>Click a building to view details</span>
    </div>
  </div>

  <script src="buildings.js"></script>
  <script src="script.js"></script>
  <script>
  (function() {
    const chart = document.getElementById('chart');
    const sorted = getAllByHeight();
    const tallest = sorted[0].height;     // 828 (Burj)

    document.getElementById('building-count').textContent = sorted.length + ' buildings shown';

    /* ── Per-building art bounding box inside the renderer's 200×800 viewBox.
       Cropping to this box makes every building's ground sit at the SVG bottom,
       producing a strict shared baseline regardless of art differences. ─── */
    const ART_BBOX = {
      'burj-khalifa':            { x: 50, y: 20,  w: 100, h: 735 },
      'merdeka-118':             { x: 55, y: 40,  w: 90,  h: 720 },
      'shanghai-tower':          { x: 55, y: 135, w: 90,  h: 625 },
      'tokyo-skytree':           { x: 50, y: 10,  w: 100, h: 770 },
      'mecca-royal-clock':       { x: 40, y: 15,  w: 120, h: 775 },
      'lotte-world-tower':       { x: 50, y: 120, w: 100, h: 640 },
      'cn-tower':                { x: 75, y: 10,  w: 50,  h: 750 },
      'one-world-trade-center':  { x: 55, y: 10,  w: 90,  h: 750 },
      'taipei-101':              { x: 60, y: 20,  w: 80,  h: 740 },
      'zifeng-tower':            { x: 65, y: 40,  w: 70,  h: 720 },
      'petronas-twin-tower':     { x: 40, y: 80,  w: 120, h: 680 },
      'willis-tower':            { x: 55, y: 80,  w: 90,  h: 680 },
      'one-vanderbilt':          { x: 55, y: 50,  w: 90,  h: 710 },
      'marina-101':              { x: 60, y: 20,  w: 80,  h: 740 },
      'al-hamra-tower':          { x: 55, y: 110, w: 90,  h: 650 },
      'empire-state-building':   { x: 60, y: 100, w: 80,  h: 660 },
      'q1-tower':                { x: 60, y: 20,  w: 80,  h: 740 },
      'burj-al-arab':            { x: 60, y: 50,  w: 80,  h: 710 },
      'chrysler-building':       { x: 55, y: 60,  w: 90,  h: 700 },
      'eureka-tower':            { x: 60, y: 200, w: 80,  h: 560 },
      'kingdom-centre':          { x: 55, y: 250, w: 90,  h: 510 },
      'the-shard':               { x: 55, y: 150, w: 90,  h: 610 },
      '101-collins-street':      { x: 45, y: 40,  w: 110, h: 730 },
      'one-canada-square':       { x: 60, y: 260, w: 80,  h: 500 },
      'heron-tower':             { x: 60, y: 225, w: 80,  h: 545 }
    };

    /* Real-world width-to-height ratio (visual footprint) — used to override
       the art's intrinsic aspect ratio so silhouettes don't read as too wide. */
    const WIDTH_RATIO = {
      'burj-khalifa': 0.085,
      'merdeka-118': 0.10,
      'shanghai-tower': 0.13,
      'tokyo-skytree': 0.13,
      'mecca-royal-clock': 0.20,
      'lotte-world-tower': 0.10,
      'cn-tower': 0.07,
      'one-world-trade-center': 0.12,
      'taipei-101': 0.16,
      'zifeng-tower': 0.10,
      'petronas-twin-tower': 0.30,
      'willis-tower': 0.18,
      'one-vanderbilt': 0.13,
      'marina-101': 0.10,
      'al-hamra-tower': 0.14,
      'empire-state-building': 0.20,
      'q1-tower': 0.11,
      'burj-al-arab': 0.20,
      'chrysler-building': 0.18,
      'eureka-tower': 0.18,
      'kingdom-centre': 0.20,
      'the-shard': 0.20,
      '101-collins-street': 0.18,
      'one-canada-square': 0.20,
      'heron-tower': 0.18
    };

    function layout() {
      chart.innerHTML = '';
      const chartH = chart.clientHeight;
      const labelArea = 108;                      // px reserved beneath SVG for baseline gap + label + meters
      const maxBuildingPx = Math.max(220, chartH - labelArea - 42);
      const pxPerMeter = maxBuildingPx / tallest; // strict linear scale

      sorted.forEach(function(b) {
        const pxH = Math.round(b.height * pxPerMeter);
        const pxW = Math.max(28, Math.round(b.height * pxPerMeter * (WIDTH_RATIO[b.id] || 0.13)));
        const bbox = ART_BBOX[b.id] || { x: 50, y: 50, w: 100, h: 710 };

        const a = document.createElement('a');
        a.className = 'h-item';
        a.href = 'building.html?id=' + b.id;
        a.style.width = Math.max(pxW + 24, 96) + 'px';

        a.innerHTML =
          '<div class="h-svg-wrap">' +
            '<svg viewBox="' + bbox.x + ' ' + bbox.y + ' ' + bbox.w + ' ' + bbox.h + '" ' +
            'width="' + pxW + '" height="' + pxH + '" ' +
            'preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg" ' +
            'role="img" aria-label="' + b.name + '">' +
              renderBuildingSvg(b.id, 200, 800, 'height') +
            '</svg>' +
          '</div>' +
          '<div class="h-label">' + b.name + '</div>' +
          '<div class="h-meters">' + b.height + ' M</div>';
        chart.appendChild(a);
      });

      updateScrollbar();
    }

    /* ── Custom scrollbar wiring ─────────────────────────── */
    const track = document.getElementById('scroll-track');
    const thumb = document.getElementById('scroll-thumb');

    function updateScrollbar() {
      const cw = chart.clientWidth;
      const sw = chart.scrollWidth;
      const tw = track.clientWidth;
      if (sw <= cw) {
        thumb.style.width = tw + 'px';
        thumb.style.left = '0px';
        return;
      }
      const ratio = cw / sw;
      const thumbW = Math.max(60, Math.round(tw * ratio));
      thumb.style.width = thumbW + 'px';
      const maxScroll = sw - cw;
      const maxThumb = tw - thumbW;
      const left = maxScroll > 0 ? (chart.scrollLeft / maxScroll) * maxThumb : 0;
      thumb.style.left = left + 'px';
    }

    chart.addEventListener('scroll', updateScrollbar);
    window.addEventListener('resize', layout);

    /* drag thumb */
    let dragging = false, startX = 0, startScroll = 0;
    thumb.addEventListener('mousedown', (e) => {
      dragging = true;
      startX = e.clientX;
      startScroll = chart.scrollLeft;
      thumb.classList.add('dragging');
      e.preventDefault();
    });
    window.addEventListener('mousemove', (e) => {
      if (!dragging) return;
      const tw = track.clientWidth;
      const thumbW = thumb.clientWidth;
      const maxThumb = tw - thumbW;
      const maxScroll = chart.scrollWidth - chart.clientWidth;
      if (maxThumb <= 0 || maxScroll <= 0) return;
      const dx = e.clientX - startX;
      const scrollDelta = (dx / maxThumb) * maxScroll;
      chart.scrollLeft = startScroll + scrollDelta;
    });
    window.addEventListener('mouseup', () => {
      if (dragging) { dragging = false; thumb.classList.remove('dragging'); }
    });

    /* click on track jumps */
    track.addEventListener('mousedown', (e) => {
      if (e.target === thumb) return;
      const rect = track.getBoundingClientRect();
      const clickX = e.clientX - rect.left;
      const tw = track.clientWidth;
      const thumbW = thumb.clientWidth;
      const target = Math.max(0, Math.min(tw - thumbW, clickX - thumbW / 2));
      const maxThumb = tw - thumbW;
      const maxScroll = chart.scrollWidth - chart.clientWidth;
      chart.scrollLeft = (target / maxThumb) * maxScroll;
    });

    /* mouse wheel → horizontal scroll */
    chart.addEventListener('wheel', (e) => {
      if (Math.abs(e.deltaY) > Math.abs(e.deltaX)) {
        chart.scrollLeft += e.deltaY;
        e.preventDefault();
      }
    }, { passive: false });

    layout();
  })();
  </script>
</body>
</html>
